<hrm-drawer
  [title]="isEdit ? 'Edit Duty Slot' : 'Add Duty Slot'"
  [subtitle]="isEdit ? 'Update shift schedule.' : 'Define a shift pattern for attendance.'"
  [locked]="saving()"
  (dismiss)="dismiss.emit()"
>
  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <div class="form-group">
      <label class="form-label">Slot Name <span class="required">*</span></label>
      <input
        type="text"
        class="form-control"
        formControlName="slotName"
        placeholder="Day Shift / Night Shift"
        [class.is-invalid]="hasError('slotName', 'required')"
      />
      <span class="form-error" *ngIf="hasError('slotName', 'required')">Required.</span>
    </div>

    <div class="form-grid form-grid--2">
      <div class="form-group">
        <label class="form-label">Start Time <span class="required">*</span></label>
        <input type="time" class="form-control" formControlName="startTime" />
      </div>
      <div class="form-group">
        <label class="form-label">End Time <span class="required">*</span></label>
        <input type="time" class="form-control" formControlName="endTime" />
      </div>
    </div>

    <div class="form-grid form-grid--2">
      <div class="form-group">
        <label class="form-label">Break Duration (mins)</label>
        <input
          type="number"
          class="form-control"
          formControlName="breakDurationMinutes"
          min="0"
          max="480"
        />
      </div>
      <div class="form-group">
        <label class="form-label">Late Tolerance (mins)</label>
        <input
          type="number"
          class="form-control"
          formControlName="lateToleranceMinutes"
          min="0"
          max="120"
        />
        <span class="form-hint">Grace minutes before marking the entry as late.</span>
      </div>
    </div>

    <div class="duty-preview">
      <div>
        <span class="text-label">Total Working</span>
        <strong>{{ preview().label }}</strong>
      </div>
      <div *ngIf="preview().isNightShift" class="duty-preview__night">Night shift</div>
    </div>

    <div *ngIf="isEdit" class="form-group" style="margin-top: 1rem">
      <label class="company-form__toggle">
        <input type="checkbox" formControlName="isActive" />
        <span>Slot is active</span>
      </label>
    </div>
  </form>

  <ng-container drawer-footer>
    <button type="button" class="btn btn--secondary" [disabled]="saving()" (click)="dismiss.emit()">Cancel</button>
    <button type="button" class="btn btn--primary" [disabled]="saving()" (click)="submit()">
      {{ saving() ? 'Saving…' : isEdit ? 'Save Changes' : 'Create Slot' }}
    </button>
  </ng-container>
</hrm-drawer>
