<hrm-drawer
  [title]="isEdit ? 'Edit Holiday' : 'Add Holiday'"
  [locked]="saving()"
  (dismiss)="dismiss.emit()"
>
  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <div class="form-group">
      <label class="form-label">Holiday Name <span class="required">*</span></label>
      <input
        type="text"
        class="form-control"
        formControlName="holidayName"
        placeholder="Independence Day"
        [class.is-invalid]="hasError('holidayName', 'required')"
      />
      <span class="form-error" *ngIf="hasError('holidayName', 'required')">Required.</span>
    </div>

    <div class="form-grid form-grid--2">
      <div class="form-group">
        <label class="form-label">Date <span class="required">*</span></label>
        <input
          type="date"
          class="form-control"
          formControlName="holidayDate"
          [class.is-invalid]="hasError('holidayDate', 'required')"
        />
      </div>
      <div class="form-group">
        <label class="form-label">Type <span class="required">*</span></label>
        <select class="form-control" formControlName="holidayType">
          <option *ngFor="let t of types" [value]="t">{{ t }}</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-control" formControlName="description" rows="2"></textarea>
    </div>

    <div class="form-group">
      <label class="company-form__toggle">
        <input type="checkbox" formControlName="isRecurringYearly" />
        <span>Recurs every year on this date</span>
      </label>
    </div>

    <div class="form-group">
      <label class="form-label">Scope</label>
      <div class="form-grid form-grid--2">
        <label class="company-form__toggle">
          <input type="radio" formControlName="scope" value="org" />
          <span>Organization-wide</span>
        </label>
        <label class="company-form__toggle">
          <input type="radio" formControlName="scope" value="branch" />
          <span>Specific branch</span>
        </label>
      </div>
    </div>

    <div class="form-group" *ngIf="form.value.scope === 'branch'">
      <label class="form-label">Branch <span class="required">*</span></label>
      <select class="form-control" formControlName="branchId">
        <option [ngValue]="null">Select a branch</option>
        <option *ngFor="let b of branchOptions()" [ngValue]="b.id">{{ b.name }}</option>
      </select>
    </div>

    <div *ngIf="isEdit" class="form-group">
      <label class="company-form__toggle">
        <input type="checkbox" formControlName="isActive" />
        <span>Holiday is active</span>
      </label>
    </div>
  </form>

  <ng-container drawer-footer>
    <button type="button" class="btn btn--secondary" [disabled]="saving()" (click)="dismiss.emit()">Cancel</button>
    <button type="button" class="btn btn--primary" [disabled]="saving()" (click)="submit()">
      {{ saving() ? 'Saving…' : isEdit ? 'Save Changes' : 'Add Holiday' }}
    </button>
  </ng-container>
</hrm-drawer>
