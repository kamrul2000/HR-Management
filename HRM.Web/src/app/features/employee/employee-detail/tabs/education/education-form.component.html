<hrm-drawer
  [title]="isEdit ? 'Edit Education' : 'Add Education'"
  [locked]="saving()"
  (dismiss)="dismiss.emit()"
>
  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <div class="form-group">
      <label class="form-label">Degree <span class="required">*</span></label>
      <input
        type="text"
        class="form-control"
        formControlName="degree"
        placeholder="B.Sc. Computer Science"
        [class.is-invalid]="hasError('degree', 'required')"
      />
      <span class="form-error" *ngIf="hasError('degree', 'required')">Required.</span>
    </div>

    <div class="form-group">
      <label class="form-label">Institution <span class="required">*</span></label>
      <input
        type="text"
        class="form-control"
        formControlName="institution"
        [class.is-invalid]="hasError('institution', 'required')"
      />
      <span class="form-error" *ngIf="hasError('institution', 'required')">Required.</span>
    </div>

    <div class="form-grid form-grid--2">
      <div class="form-group">
        <label class="form-label">Passing Year <span class="required">*</span></label>
        <input
          type="number"
          class="form-control"
          formControlName="passingYear"
          min="1950"
          max="2100"
          [class.is-invalid]="hasError('passingYear', 'required') || hasError('passingYear', 'min') || hasError('passingYear', 'max')"
        />
      </div>
      <div class="form-group">
        <label class="form-label">Result</label>
        <input type="text" class="form-control" formControlName="result" placeholder="3.75 CGPA" />
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Major Subject</label>
      <input type="text" class="form-control" formControlName="majorSubject" />
    </div>
  </form>

  <ng-container drawer-footer>
    <button type="button" class="btn btn--secondary" [disabled]="saving()" (click)="dismiss.emit()">Cancel</button>
    <button type="button" class="btn btn--primary" [disabled]="saving()" (click)="submit()">
      {{ saving() ? 'Saving…' : isEdit ? 'Save Changes' : 'Add Education' }}
    </button>
  </ng-container>
</hrm-drawer>
