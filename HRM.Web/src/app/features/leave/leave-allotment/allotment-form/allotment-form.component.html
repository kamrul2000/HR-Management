<hrm-drawer
  [title]="isEdit ? 'Edit Allotment' : 'Add Allotment'"
  [subtitle]="isEdit ? 'Update allocation for this employee.' : 'Allocate leave days for an employee.'"
  [locked]="saving()"
  (dismiss)="dismiss.emit()"
>
  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <div class="form-group" style="position: relative;">
      <label class="form-label">Employee <span class="required">*</span></label>
      <input
        type="text"
        class="form-control"
        [ngModel]="form.value.employeeLabel"
        [ngModelOptions]="{ standalone: true }"
        (ngModelChange)="onEmployeeSearch($event)"
        placeholder="Search by name or code…"
        [readonly]="isEdit"
        [class.is-invalid]="hasError('employeeId', 'min')"
      />
      <ul *ngIf="searchResults().length > 0" class="emp-autocomplete">
        <li *ngFor="let emp of searchResults()" (click)="pickEmployee(emp)">
          <strong>{{ emp.fullName }}</strong>
          <span class="text-muted text-mono"> · {{ emp.employeeCode }}</span>
        </li>
      </ul>
      <span class="form-error" *ngIf="hasError('employeeId', 'min')">Please pick an employee.</span>
    </div>

    <div class="form-grid form-grid--2">
      <div class="form-group">
        <label class="form-label">Leave Type <span class="required">*</span></label>
        <select
          class="form-control"
          formControlName="leaveTypeId"
          [class.is-invalid]="hasError('leaveTypeId', 'min')"
        >
          <option [ngValue]="0" disabled>Select a leave type</option>
          <option *ngFor="let t of leaveTypeOptions()" [ngValue]="t.id">
            {{ t.name }} ({{ t.code }})
          </option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Year <span class="required">*</span></label>
        <input
          type="number"
          class="form-control"
          formControlName="year"
          min="2000"
          max="2100"
        />
      </div>
    </div>

    <div class="form-grid form-grid--2">
      <div class="form-group">
        <label class="form-label">Allocated Days <span class="required">*</span></label>
        <input
          type="number"
          class="form-control"
          formControlName="allocatedDays"
          min="0"
          max="365"
          step="0.5"
        />
      </div>
      <div class="form-group">
        <label class="form-label">Carried Forward</label>
        <input
          type="number"
          class="form-control"
          formControlName="carriedForwardDays"
          min="0"
          max="365"
          step="0.5"
        />
      </div>
    </div>

    <div *ngIf="isEdit" class="form-group">
      <label class="company-form__toggle">
        <input type="checkbox" formControlName="isActive" />
        <span>Allotment is active</span>
      </label>
    </div>
  </form>

  <ng-container drawer-footer>
    <button type="button" class="btn btn--secondary" [disabled]="saving()" (click)="dismiss.emit()">Cancel</button>
    <button type="button" class="btn btn--primary" [disabled]="saving()" (click)="submit()">
      {{ saving() ? 'Saving…' : isEdit ? 'Save Changes' : 'Create Allotment' }}
    </button>
  </ng-container>
</hrm-drawer>
