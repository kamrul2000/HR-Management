<hrm-drawer
  title="New Loan Application"
  subtitle="Submit a loan request for an employee."
  [locked]="saving()"
  (dismiss)="dismiss.emit()"
>
  <form [formGroup]="form" (ngSubmit)="submit()" autocomplete="off">
    <div class="form-group" style="position: relative;">
      <label class="form-label">Employee <span class="required">*</span></label>
      <input
        type="text"
        class="form-control"
        placeholder="Search employee by name or code…"
        [value]="form.value.employeeLabel || ''"
        (input)="onEmployeeSearch($any($event.target).value)"
        [class.is-invalid]="hasError('employeeId', 'required') || hasError('employeeId', 'min')"
      />
      <ul *ngIf="searchResults().length > 0" class="emp-autocomplete">
        <li *ngFor="let emp of searchResults()" (click)="pickEmployee(emp)">
          <strong>{{ emp.fullName }}</strong>
          <span class="text-muted text-xs"> · {{ emp.employeeCode }}</span>
        </li>
      </ul>
    </div>

    <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
      <div class="form-group">
        <label class="form-label">Loan Type <span class="required">*</span></label>
        <select class="form-control" formControlName="loanType">
          <option *ngFor="let t of loanTypes" [value]="t">{{ t }}</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Tenure (months) <span class="required">*</span></label>
        <input
          type="number"
          class="form-control"
          min="1"
          max="120"
          formControlName="requestedTenureMonths"
        />
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Requested Amount <span class="required">*</span></label>
      <input
        type="number"
        class="form-control"
        min="1"
        step="0.01"
        formControlName="requestedAmount"
      />
    </div>

    <div class="emi-pill">
      <span class="emi-pill__label">Estimated Monthly Installment</span>
      <span class="emi-pill__value">{{ estimatedEmi() | currencyBd }}</span>
    </div>

    <div class="form-group" style="margin-top: 12px;">
      <label class="form-label">Purpose <span class="required">*</span></label>
      <textarea
        class="form-control"
        rows="3"
        formControlName="purpose"
        placeholder="Why is this loan being requested?"
      ></textarea>
    </div>
  </form>

  <ng-container drawer-footer>
    <button type="button" class="btn btn--secondary" [disabled]="saving()" (click)="dismiss.emit()">Cancel</button>
    <button type="button" class="btn btn--primary" [disabled]="saving()" (click)="submit()">
      {{ saving() ? 'Submitting…' : 'Submit Application' }}
    </button>
  </ng-container>
</hrm-drawer>
