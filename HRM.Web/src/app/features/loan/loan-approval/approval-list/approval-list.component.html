<hrm-page-header title="Loan Approvals" subtitle="Review applications recommended for approval.">
</hrm-page-header>

<div class="page-content">
  <div class="toolbar">
    <div class="toolbar__field">
      <select
        class="form-control"
        [ngModel]="statusFilter()"
        (ngModelChange)="statusFilter.set($event); onFilterChange()"
      >
        <option *ngFor="let s of statusOptions" [value]="s">{{ s }}</option>
      </select>
    </div>
  </div>

  <hrm-data-table
    [columns]="columns"
    [rows]="rows()"
    [loading]="loading()"
    [page]="pageState()"
    [showPagination]="true"
    [actionsTemplate]="actionsTpl"
    rowKey="id"
    emptyTitle="Nothing waiting"
    emptyMessage="No applications match this filter."
    (pageChange)="onPageChange($event)"
  ></hrm-data-table>
</div>

<ng-template #employeeCellTpl let-row>
  <div style="display: inline-flex; align-items: center; gap: 10px;">
    <hrm-avatar [name]="row.employeeFullName || ''" [size]="32"></hrm-avatar>
    <div>
      <div class="text-strong">{{ row.employeeFullName || '—' }}</div>
      <div class="text-muted text-xs text-mono">{{ row.employeeCode }}</div>
    </div>
  </div>
</ng-template>

<ng-template #amountCellTpl let-row>
  <span class="text-mono">{{ row.requestedAmount | currencyBd }}</span>
</ng-template>

<ng-template #statusCellTpl let-row>
  <hrm-status-badge [variant]="row.status" [label]="row.statusLabel || row.status"></hrm-status-badge>
</ng-template>

<ng-template #actionsTpl let-row>
  <a class="btn btn--ghost btn--sm" [routerLink]="['/loans/applications', row.id]">
    <ng-icon [name]="row.status === 'Recommended' ? 'heroCheck' : 'heroPaperAirplane'" size="14" />
    {{ row.status === 'Recommended' ? 'Approve' : 'Disburse' }}
  </a>
</ng-template>
