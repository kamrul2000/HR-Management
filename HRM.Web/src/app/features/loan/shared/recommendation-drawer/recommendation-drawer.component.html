<hrm-drawer
  title="Loan Recommendation"
  [subtitle]="application.applicationNo + ' · ' + application.employeeFullName"
  [locked]="saving()"
  (dismiss)="dismiss.emit()"
>
  <div class="ref-grid" style="margin-bottom: 16px;">
    <div class="ref-card">
      <div class="ref-card__label">Requested Amount</div>
      <div class="ref-card__value">{{ application.requestedAmount | currencyBd }}</div>
    </div>
    <div class="ref-card">
      <div class="ref-card__label">Requested Tenure</div>
      <div class="ref-card__value">{{ application.requestedTenureMonths }} months</div>
    </div>
  </div>

  <form [formGroup]="form">
    <div class="form-group">
      <label class="form-label">Decision <span class="required">*</span></label>
      <div style="display: flex; gap: 8px;">
        <button
          type="button"
          class="btn"
          [class.btn--primary]="isRecommend()"
          [class.btn--secondary]="!isRecommend()"
          (click)="setDecision('Recommend')"
        >Recommend</button>
        <button
          type="button"
          class="btn"
          [class.btn--danger]="!isRecommend()"
          [class.btn--secondary]="isRecommend()"
          (click)="setDecision('Reject')"
        >Reject</button>
      </div>
    </div>

    <div *ngIf="isRecommend()" class="ref-grid">
      <div class="form-group">
        <label class="form-label">Recommended Amount <span class="required">*</span></label>
        <input
          type="number"
          class="form-control"
          min="0"
          step="0.01"
          formControlName="recommendedAmount"
        />
      </div>
      <div class="form-group">
        <label class="form-label">Recommended Tenure (months) <span class="required">*</span></label>
        <input
          type="number"
          class="form-control"
          min="1"
          max="120"
          formControlName="recommendedTenureMonths"
        />
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Remarks <span class="required">*</span></label>
      <textarea
        class="form-control"
        rows="3"
        formControlName="remarks"
        placeholder="Justification for this decision."
      ></textarea>
    </div>
  </form>

  <ng-container drawer-footer>
    <button type="button" class="btn btn--secondary" [disabled]="saving()" (click)="dismiss.emit()">Cancel</button>
    <button
      type="button"
      [class.btn--primary]="isRecommend()"
      [class.btn--danger]="!isRecommend()"
      class="btn"
      [disabled]="saving()"
      (click)="submit()"
    >
      {{ saving() ? 'Submitting…' : (isRecommend() ? 'Recommend' : 'Reject') }}
    </button>
  </ng-container>
</hrm-drawer>
