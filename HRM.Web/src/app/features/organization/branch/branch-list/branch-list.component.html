<hrm-page-header title="Branches" subtitle="Locations operating under each company.">
  <button type="button" class="btn btn--primary" (click)="openCreate()">
    <ng-icon name="heroPlus" size="14" />
    Add Branch
  </button>
</hrm-page-header>

<div class="page-content">
  <div class="toolbar">
    <div class="toolbar__field toolbar__field--grow">
      <div class="company-list__search">
        <ng-icon name="heroMagnifyingGlass" size="16" />
        <input
          type="search"
          class="form-control"
          placeholder="Search by name, code, email…"
          [ngModel]="searchTerm()"
          (ngModelChange)="searchTerm.set($event)"
        />
      </div>
    </div>

    <div class="toolbar__field">
      <select
        class="form-control"
        [ngModel]="companyFilter()"
        (ngModelChange)="companyFilter.set($event ? +$event : null)"
        aria-label="Filter by company"
      >
        <option [ngValue]="null">All companies</option>
        <option *ngFor="let c of companyOptions()" [ngValue]="c.id">
          {{ c.name }}
        </option>
      </select>
    </div>
  </div>

  <hrm-data-table
    [columns]="columns"
    [rows]="filtered()"
    [loading]="loading()"
    [showPagination]="false"
    [actionsTemplate]="actionsTpl"
    rowKey="id"
    emptyTitle="No branches yet"
    emptyMessage="Create your first branch under a company."
  ></hrm-data-table>
</div>

<ng-template #statusCellTpl let-row>
  <hrm-status-badge
    [variant]="row.isActive ? 'active' : 'inactive'"
    [label]="row.isActive ? 'Active' : 'Inactive'"
  ></hrm-status-badge>
</ng-template>

<ng-template #actionsTpl let-row>
  <button
    type="button"
    class="btn btn--icon btn--ghost-neutral"
    (click)="openEdit(row)"
    aria-label="Edit branch"
  >
    <ng-icon name="heroPencilSquare" size="16" />
  </button>
  <button
    type="button"
    class="btn btn--icon btn--ghost-neutral"
    (click)="delete(row)"
    aria-label="Delete branch"
  >
    <ng-icon name="heroTrash" size="16" />
  </button>
</ng-template>

<ng-container *ngIf="drawerOpen()">
  <hrm-branch-form
    [branch]="editingBranch()"
    [defaultCompanyId]="companyFilter()"
    (saved)="onSaved($event)"
    (dismiss)="closeDrawer()"
  ></hrm-branch-form>
</ng-container>
