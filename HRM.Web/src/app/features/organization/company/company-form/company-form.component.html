<hrm-drawer
  [title]="isEdit ? 'Edit Company' : 'Add Company'"
  [subtitle]="isEdit ? 'Update company details, status, and logo.' : 'Create a new company within your tenant.'"
  [locked]="saving() || uploadingLogo()"
  (dismiss)="dismiss.emit()"
>
  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <div class="form-group">
      <label class="form-label" for="company-name">
        Name <span class="required">*</span>
      </label>
      <input
        id="company-name"
        type="text"
        class="form-control"
        formControlName="name"
        placeholder="Acme Industries Ltd."
        [class.is-invalid]="hasError('name', 'required') || hasError('name', 'maxlength')"
      />
      <span class="form-error" *ngIf="hasError('name', 'required')">Name is required.</span>
      <span class="form-error" *ngIf="hasError('name', 'maxlength')">Maximum 150 characters.</span>
    </div>

    <div class="form-grid form-grid--2">
      <div class="form-group">
        <label class="form-label" for="company-phone">
          Phone <span class="required">*</span>
        </label>
        <input
          id="company-phone"
          type="tel"
          class="form-control"
          formControlName="phone"
          placeholder="+880 1XXX-XXXXXX"
          [class.is-invalid]="hasError('phone', 'required')"
        />
        <span class="form-error" *ngIf="hasError('phone', 'required')">Phone is required.</span>
      </div>

      <div class="form-group">
        <label class="form-label" for="company-email">
          Email <span class="required">*</span>
        </label>
        <input
          id="company-email"
          type="email"
          class="form-control"
          formControlName="email"
          placeholder="info@company.com"
          [class.is-invalid]="hasError('email', 'required') || hasError('email', 'email')"
        />
        <span class="form-error" *ngIf="hasError('email', 'required')">Email is required.</span>
        <span class="form-error" *ngIf="hasError('email', 'email')">Enter a valid email.</span>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="company-website">Website</label>
      <input
        id="company-website"
        type="url"
        class="form-control"
        formControlName="website"
        placeholder="https://company.com"
      />
      <span class="form-hint">Optional — including https:// is recommended.</span>
    </div>

    <div class="form-group">
      <label class="form-label" for="company-address">
        Address <span class="required">*</span>
      </label>
      <textarea
        id="company-address"
        class="form-control"
        formControlName="address"
        rows="3"
        placeholder="Street, City, Country"
        [class.is-invalid]="hasError('address', 'required')"
      ></textarea>
      <span class="form-error" *ngIf="hasError('address', 'required')">Address is required.</span>
    </div>

    <div *ngIf="isEdit" class="form-group">
      <label class="company-form__toggle">
        <input type="checkbox" formControlName="isActive" />
        <span>Company is active</span>
      </label>
    </div>
  </form>

  <ng-container *ngIf="isEdit && company">
    <div class="divider"></div>

    <h4 class="company-form__section-title">Company Logo</h4>
    <p class="text-muted text-sm" style="margin-bottom: 12px">
      Upload a square image. Recommended size 256×256 px, max 5 MB.
    </p>

    <div *ngIf="company.logoUrl" class="company-form__logo-preview">
      <img [src]="company.logoUrl" [alt]="company.name + ' logo'" />
    </div>

    <hrm-file-upload
      accept="image/png,image/jpeg,image/webp"
      [maxBytes]="5 * 1024 * 1024"
      label="Click or drop an image to upload"
      hint="PNG, JPG or WebP up to 5 MB"
      [disabled]="uploadingLogo()"
      (fileSelected)="onLogoSelected($event)"
      (error)="onUploadError($event)"
    ></hrm-file-upload>
  </ng-container>

  <ng-container drawer-footer>
    <button
      type="button"
      class="btn btn--secondary"
      [disabled]="saving() || uploadingLogo()"
      (click)="dismiss.emit()"
    >
      Cancel
    </button>
    <button
      type="button"
      class="btn btn--primary"
      [disabled]="saving() || uploadingLogo()"
      (click)="submit()"
    >
      {{ saving() ? 'Saving…' : isEdit ? 'Save Changes' : 'Create Company' }}
    </button>
  </ng-container>
</hrm-drawer>
