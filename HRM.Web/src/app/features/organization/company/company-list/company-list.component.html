<hrm-page-header title="Companies" subtitle="Tenant-level companies and branding.">
  <button type="button" class="btn btn--primary" (click)="openCreate()">
    <ng-icon name="heroPlus" size="14" />
    Add Company
  </button>
</hrm-page-header>

<div class="page-content">
  <div class="toolbar">
    <div class="toolbar__field toolbar__field--grow">
      <div class="company-list__search">
        <ng-icon name="heroMagnifyingGlass" size="16" />
        <input
          type="search"
          class="form-control"
          placeholder="Search by name, email, phone…"
          [ngModel]="searchTerm()"
          (ngModelChange)="searchTerm.set($event)"
        />
      </div>
    </div>
  </div>

  <hrm-data-table
    [columns]="columns"
    [rows]="filtered()"
    [loading]="loading()"
    [showPagination]="false"
    [actionsTemplate]="actionsTpl"
    rowKey="id"
    emptyTitle="No companies yet"
    emptyMessage="Create your first company to get started."
  ></hrm-data-table>
</div>

<!-- Cell templates referenced by ViewChild and bound to TableColumn.template -->
<ng-template #logoCellTpl let-row>
  <div class="company-list__logo">
    <img *ngIf="row.logoUrl; else logoFallback" [src]="row.logoUrl" [alt]="row.name + ' logo'" />
    <ng-template #logoFallback>
      <span class="company-list__logo-fallback">{{ initials(row.name) }}</span>
    </ng-template>
  </div>
</ng-template>

<ng-template #statusCellTpl let-row>
  <hrm-status-badge
    [variant]="row.isActive ? 'active' : 'inactive'"
    [label]="row.isActive ? 'Active' : 'Inactive'"
  ></hrm-status-badge>
</ng-template>

<ng-template #actionsTpl let-row>
  <button
    type="button"
    class="btn btn--icon btn--ghost-neutral"
    (click)="openEdit(row)"
    title="Edit"
    aria-label="Edit company"
  >
    <ng-icon name="heroPencilSquare" size="16" />
  </button>
  <button
    type="button"
    class="btn btn--icon btn--ghost-neutral"
    (click)="delete(row)"
    title="Delete"
    aria-label="Delete company"
  >
    <ng-icon name="heroTrash" size="16" />
  </button>
</ng-template>

<!-- Drawer: create or edit -->
<ng-container *ngIf="drawerOpen()">
  <hrm-company-form
    [company]="editingCompany()"
    (saved)="onSaved($event)"
    (dismiss)="closeDrawer()"
  ></hrm-company-form>
</ng-container>
