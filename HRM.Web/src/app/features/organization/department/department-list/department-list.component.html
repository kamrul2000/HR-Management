<hrm-page-header title="Departments" subtitle="Functional units within each branch.">
  <button type="button" class="btn btn--primary" (click)="openCreate()">
    <ng-icon name="heroPlus" size="14" />
    Add Department
  </button>
</hrm-page-header>

<div class="page-content">
  <div class="toolbar">
    <div class="toolbar__field toolbar__field--grow">
      <div class="company-list__search">
        <ng-icon name="heroMagnifyingGlass" size="16" />
        <input
          type="search"
          class="form-control"
          placeholder="Search by name, branch, company…"
          [ngModel]="searchTerm()"
          (ngModelChange)="searchTerm.set($event)"
        />
      </div>
    </div>

    <div class="toolbar__field">
      <select
        class="form-control"
        [ngModel]="branchFilter()"
        (ngModelChange)="branchFilter.set($event ? +$event : null)"
        aria-label="Filter by branch"
      >
        <option [ngValue]="null">All branches</option>
        <option *ngFor="let b of branchOptions()" [ngValue]="b.id">
          {{ b.name }}<span *ngIf="b.companyName"> ({{ b.companyName }})</span>
        </option>
      </select>
    </div>
  </div>

  <hrm-data-table
    [columns]="columns"
    [rows]="filtered()"
    [loading]="loading()"
    [showPagination]="false"
    [actionsTemplate]="actionsTpl"
    rowKey="id"
    emptyTitle="No departments yet"
    emptyMessage="Create your first department under a branch."
  ></hrm-data-table>
</div>

<ng-template #hierarchyCellTpl let-row>
  <div>
    <div class="text-strong">{{ row.branchName || '—' }}</div>
    <div class="text-muted text-xs">{{ row.companyName || '—' }}</div>
  </div>
</ng-template>

<ng-template #statusCellTpl let-row>
  <hrm-status-badge
    [variant]="row.isActive ? 'active' : 'inactive'"
    [label]="row.isActive ? 'Active' : 'Inactive'"
  ></hrm-status-badge>
</ng-template>

<ng-template #actionsTpl let-row>
  <button
    type="button"
    class="btn btn--icon btn--ghost-neutral"
    (click)="openEdit(row)"
    aria-label="Edit department"
  >
    <ng-icon name="heroPencilSquare" size="16" />
  </button>
  <button
    type="button"
    class="btn btn--icon btn--ghost-neutral"
    (click)="delete(row)"
    aria-label="Delete department"
  >
    <ng-icon name="heroTrash" size="16" />
  </button>
</ng-template>

<ng-container *ngIf="drawerOpen()">
  <hrm-department-form
    [department]="editingDepartment()"
    [defaultBranchId]="branchFilter()"
    (saved)="onSaved($event)"
    (dismiss)="closeDrawer()"
  ></hrm-department-form>
</ng-container>
