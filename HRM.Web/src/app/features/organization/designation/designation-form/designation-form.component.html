<hrm-drawer
  [title]="isEdit ? 'Edit Designation' : 'Add Designation'"
  [subtitle]="isEdit ? 'Update designation details.' : 'Create a new role title within a department.'"
  [locked]="saving()"
  (dismiss)="dismiss.emit()"
>
  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <div class="form-group">
      <label class="form-label" for="designation-department">
        Department <span class="required">*</span>
      </label>
      <select
        id="designation-department"
        class="form-control"
        formControlName="departmentId"
        [class.is-invalid]="hasError('departmentId', 'min') || hasError('departmentId', 'required')"
      >
        <option [ngValue]="0" disabled>
          {{ departmentsLoading() ? 'Loading departments…' : 'Select a department' }}
        </option>
        <option *ngFor="let d of departmentOptions()" [ngValue]="d.id">
          {{ departmentLabel(d) }}
        </option>
      </select>
      <span class="form-error" *ngIf="hasError('departmentId', 'min') || hasError('departmentId', 'required')">
        Please select a department.
      </span>
    </div>

    <div class="form-grid form-grid--2">
      <div class="form-group">
        <label class="form-label" for="designation-title">
          Title <span class="required">*</span>
        </label>
        <input
          id="designation-title"
          type="text"
          class="form-control"
          formControlName="title"
          placeholder="Senior Engineer"
          [class.is-invalid]="hasError('title', 'required')"
        />
        <span class="form-error" *ngIf="hasError('title', 'required')">Title is required.</span>
      </div>

      <div class="form-group">
        <label class="form-label" for="designation-grade">Grade</label>
        <input
          id="designation-grade"
          type="text"
          class="form-control"
          formControlName="grade"
          placeholder="L4 / Manager"
        />
        <span class="form-hint">Optional internal grade or band.</span>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="designation-description">Description</label>
      <textarea
        id="designation-description"
        class="form-control"
        formControlName="description"
        rows="3"
        placeholder="Optional"
      ></textarea>
    </div>

    <div *ngIf="isEdit" class="form-group">
      <label class="company-form__toggle">
        <input type="checkbox" formControlName="isActive" />
        <span>Designation is active</span>
      </label>
    </div>
  </form>

  <ng-container drawer-footer>
    <button
      type="button"
      class="btn btn--secondary"
      [disabled]="saving()"
      (click)="dismiss.emit()"
    >
      Cancel
    </button>
    <button
      type="button"
      class="btn btn--primary"
      [disabled]="saving()"
      (click)="submit()"
    >
      {{ saving() ? 'Saving…' : isEdit ? 'Save Changes' : 'Create Designation' }}
    </button>
  </ng-container>
</hrm-drawer>
