<hrm-page-header title="Designations" subtitle="Job titles within each department.">
  <button type="button" class="btn btn--primary" (click)="openCreate()">
    <ng-icon name="heroPlus" size="14" />
    Add Designation
  </button>
</hrm-page-header>

<div class="page-content">
  <div class="toolbar">
    <div class="toolbar__field toolbar__field--grow">
      <div class="company-list__search">
        <ng-icon name="heroMagnifyingGlass" size="16" />
        <input
          type="search"
          class="form-control"
          placeholder="Search by title, grade, department…"
          [ngModel]="searchTerm()"
          (ngModelChange)="searchTerm.set($event)"
        />
      </div>
    </div>

    <div class="toolbar__field">
      <select
        class="form-control"
        [ngModel]="departmentFilter()"
        (ngModelChange)="departmentFilter.set($event ? +$event : null)"
        aria-label="Filter by department"
      >
        <option [ngValue]="null">All departments</option>
        <option *ngFor="let d of departmentOptions()" [ngValue]="d.id">
          {{ d.name }}<span *ngIf="d.branchName"> ({{ d.branchName }})</span>
        </option>
      </select>
    </div>
  </div>

  <hrm-data-table
    [columns]="columns"
    [rows]="filtered()"
    [loading]="loading()"
    [showPagination]="false"
    [actionsTemplate]="actionsTpl"
    rowKey="id"
    emptyTitle="No designations yet"
    emptyMessage="Create your first job title under a department."
  ></hrm-data-table>
</div>

<ng-template #hierarchyCellTpl let-row>
  <div>
    <div class="text-strong">{{ row.departmentName || '—' }}</div>
    <div class="text-muted text-xs">
      <ng-container *ngIf="row.branchName">{{ row.branchName }}</ng-container>
      <ng-container *ngIf="row.branchName && row.companyName"> &nbsp;•&nbsp; </ng-container>
      <ng-container *ngIf="row.companyName">{{ row.companyName }}</ng-container>
    </div>
  </div>
</ng-template>

<ng-template #statusCellTpl let-row>
  <hrm-status-badge
    [variant]="row.isActive ? 'active' : 'inactive'"
    [label]="row.isActive ? 'Active' : 'Inactive'"
  ></hrm-status-badge>
</ng-template>

<ng-template #actionsTpl let-row>
  <button
    type="button"
    class="btn btn--icon btn--ghost-neutral"
    (click)="openEdit(row)"
    aria-label="Edit designation"
  >
    <ng-icon name="heroPencilSquare" size="16" />
  </button>
  <button
    type="button"
    class="btn btn--icon btn--ghost-neutral"
    (click)="delete(row)"
    aria-label="Delete designation"
  >
    <ng-icon name="heroTrash" size="16" />
  </button>
</ng-template>

<ng-container *ngIf="drawerOpen()">
  <hrm-designation-form
    [designation]="editingDesignation()"
    (saved)="onSaved($event)"
    (dismiss)="closeDrawer()"
  ></hrm-designation-form>
</ng-container>
