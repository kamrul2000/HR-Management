<hrm-drawer
  title="Add Bonus"
  subtitle="Create a bonus entry for an employee."
  [locked]="saving()"
  (dismiss)="dismiss.emit()"
>
  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <div class="form-group" style="position: relative;">
      <label class="form-label">Employee <span class="required">*</span></label>
      <input
        type="text"
        class="form-control"
        [ngModel]="form.value.employeeLabel"
        [ngModelOptions]="{ standalone: true }"
        (ngModelChange)="onEmployeeSearch($event)"
        placeholder="Search by name or code…"
        [class.is-invalid]="hasError('employeeId', 'min')"
      />
      <ul *ngIf="searchResults().length > 0" class="emp-autocomplete">
        <li *ngFor="let emp of searchResults()" (click)="pickEmployee(emp)">
          <strong>{{ emp.fullName }}</strong>
          <span class="text-muted text-mono"> · {{ emp.employeeCode }}</span>
        </li>
      </ul>
    </div>

    <div class="form-grid form-grid--2">
      <div class="form-group">
        <label class="form-label">Type <span class="required">*</span></label>
        <input type="text" class="form-control" formControlName="bonusType" placeholder="Festival" />
      </div>
      <div class="form-group">
        <label class="form-label">Title <span class="required">*</span></label>
        <input type="text" class="form-control" formControlName="bonusTitle" placeholder="Eid-ul-Fitr Bonus" />
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Calculation Basis <span class="required">*</span></label>
      <select class="form-control" formControlName="calculationBasis">
        <option *ngFor="let b of basisOptions" [value]="b.value">{{ b.label }}</option>
      </select>
    </div>

    <div class="form-grid form-grid--2">
      <div class="form-group" *ngIf="isFixed()">
        <label class="form-label">Amount <span class="required">*</span></label>
        <input type="number" class="form-control" formControlName="fixedAmount" min="0" step="0.01" />
      </div>
      <div class="form-group" *ngIf="!isFixed()">
        <label class="form-label">Percentage <span class="required">*</span></label>
        <input type="number" class="form-control" formControlName="basisPercentage" min="0.01" max="500" step="0.01" />
      </div>
    </div>

    <div class="form-grid form-grid--2">
      <div class="form-group">
        <label class="form-label">Disbursement Month <span class="required">*</span></label>
        <select class="form-control" formControlName="disbursementMonth">
          <option *ngFor="let m of months" [ngValue]="m.value">{{ m.label }}</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Disbursement Year <span class="required">*</span></label>
        <input type="number" class="form-control" formControlName="disbursementYear" min="2000" max="2100" />
      </div>
    </div>

    <div class="form-group">
      <label class="company-form__toggle">
        <input type="checkbox" formControlName="isDisbursedWithSalary" />
        <span>Disburse with salary calculation</span>
      </label>
    </div>

    <div class="form-group">
      <label class="form-label">Remarks</label>
      <textarea class="form-control" formControlName="remarks" rows="2"></textarea>
    </div>
  </form>

  <ng-container drawer-footer>
    <button type="button" class="btn btn--secondary" [disabled]="saving()" (click)="dismiss.emit()">Cancel</button>
    <button type="button" class="btn btn--primary" [disabled]="saving()" (click)="submit()">
      {{ saving() ? 'Saving…' : 'Create Bonus' }}
    </button>
  </ng-container>
</hrm-drawer>
