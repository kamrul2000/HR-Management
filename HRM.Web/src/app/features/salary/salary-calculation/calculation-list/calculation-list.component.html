<hrm-page-header title="Salary Processing" subtitle="Monthly payroll runs and payslips.">
  <a routerLink="../calculations/run" class="btn btn--primary">
    <ng-icon name="heroPlay" size="14" />
    Run Payroll
  </a>
</hrm-page-header>

<div class="page-content">
  <div class="toolbar">
    <div class="toolbar__field">
      <select class="form-control" [ngModel]="month()" (ngModelChange)="month.set(+$event); onAnyFilterChange()">
        <option *ngFor="let m of months" [ngValue]="m.value">{{ m.label }}</option>
      </select>
    </div>
    <div class="toolbar__field">
      <input
        type="number"
        class="form-control"
        min="2000"
        max="2100"
        [ngModel]="year()"
        (ngModelChange)="year.set(+$event); onAnyFilterChange()"
      />
    </div>
    <div class="toolbar__field">
      <select
        class="form-control"
        [ngModel]="branchFilter()"
        (ngModelChange)="branchFilter.set($event ? +$event : null); onAnyFilterChange()"
      >
        <option [ngValue]="null">All branches</option>
        <option *ngFor="let b of branchOptions()" [ngValue]="b.id">{{ b.name }}</option>
      </select>
    </div>
    <div class="toolbar__field">
      <select
        class="form-control"
        [ngModel]="statusFilter()"
        (ngModelChange)="statusFilter.set($event); onAnyFilterChange()"
      >
        <option value="">All statuses</option>
        <option *ngFor="let s of statusOptions" [value]="s">{{ s }}</option>
      </select>
    </div>
  </div>

  <hrm-data-table
    [columns]="columns"
    [rows]="rows()"
    [loading]="loading()"
    [page]="pageState()"
    [showPagination]="true"
    [actionsTemplate]="actionsTpl"
    rowKey="id"
    emptyTitle="No salary records"
    emptyMessage="Run payroll for the selected month to populate this list."
    (pageChange)="onPageChange($event)"
  ></hrm-data-table>
</div>

<ng-template #employeeCellTpl let-row>
  <div style="display: inline-flex; align-items: center; gap: 10px;">
    <hrm-avatar [name]="row.employeeFullName || ''" [size]="32"></hrm-avatar>
    <div>
      <div class="text-strong">{{ row.employeeFullName || '—' }}</div>
      <div class="text-muted text-xs text-mono">{{ row.employeeCode }}</div>
    </div>
  </div>
</ng-template>

<ng-template #grossCellTpl let-row>{{ row.grossSalary | currencyBd }}</ng-template>
<ng-template #netCellTpl let-row><strong>{{ row.netSalary | currencyBd }}</strong></ng-template>

<ng-template #statusCellTpl let-row>
  <hrm-status-badge [variant]="row.status" [label]="row.statusLabel || row.status"></hrm-status-badge>
</ng-template>

<ng-template #actionsTpl let-row>
  <button type="button" class="btn btn--icon btn--ghost-neutral" (click)="view(row)" aria-label="View payslip">
    <ng-icon name="heroEye" size="16" />
  </button>
</ng-template>
