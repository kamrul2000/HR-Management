<hrm-page-header title="Separation Reasons" subtitle="Manage reason taxonomy used in separations.">
  <button type="button" class="btn btn--primary" (click)="openCreate()">
    <ng-icon name="heroPlus" size="14" />
    New Reason
  </button>
</hrm-page-header>

<div class="page-content">
  <hrm-data-table
    [columns]="columns"
    [rows]="rows()"
    [loading]="loading()"
    [showPagination]="false"
    [actionsTemplate]="actionsTpl"
    rowKey="id"
    emptyTitle="No reasons defined"
    emptyMessage="Create separation reasons so HR can categorize departures."
  ></hrm-data-table>
</div>

<ng-template #typeCellTpl let-row>
  <span class="text-sm">{{ row.separationTypeLabel || row.separationType }}</span>
</ng-template>

<ng-template #activeTpl let-row>
  <hrm-status-badge
    [variant]="row.isActive ? 'active' : 'inactive'"
    [label]="row.isActive ? 'Active' : 'Inactive'"
  ></hrm-status-badge>
</ng-template>

<ng-template #actionsTpl let-row>
  <button type="button" class="btn btn--ghost btn--sm" (click)="openEdit(row)">
    <ng-icon name="heroPencilSquare" size="14" />
    Edit
  </button>
  <button type="button" class="btn btn--ghost-neutral btn--sm" (click)="delete(row)">
    <ng-icon name="heroTrash" size="14" />
    Delete
  </button>
</ng-template>

<ng-container *ngIf="drawerOpen()">
  <hrm-drawer
    [title]="isEdit() ? 'Edit Separation Reason' : 'New Separation Reason'"
    [locked]="saving()"
    (dismiss)="closeDrawer()"
  >
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label class="form-label">Reason Name <span class="required">*</span></label>
        <input type="text" class="form-control" formControlName="reasonName" maxlength="150" />
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
        <div class="form-group">
          <label class="form-label">Type <span class="required">*</span></label>
          <select class="form-control" formControlName="separationType">
            <option *ngFor="let t of types" [value]="t">{{ t }}</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Display Order <span class="required">*</span></label>
          <input type="number" class="form-control" min="1" max="999" formControlName="displayOrder" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-control" rows="2" formControlName="description"></textarea>
      </div>

      <div *ngIf="isEdit()" class="form-group">
        <label class="form-check">
          <input type="checkbox" formControlName="isActive" />
          <span>Active</span>
        </label>
      </div>
    </form>

    <ng-container drawer-footer>
      <button type="button" class="btn btn--secondary" [disabled]="saving()" (click)="closeDrawer()">Cancel</button>
      <button type="button" class="btn btn--primary" [disabled]="saving()" (click)="submit()">
        {{ saving() ? 'Saving…' : (isEdit() ? 'Save Changes' : 'Create Reason') }}
      </button>
    </ng-container>
  </hrm-drawer>
</ng-container>
