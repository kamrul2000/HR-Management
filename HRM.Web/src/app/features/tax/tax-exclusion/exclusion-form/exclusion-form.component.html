<hrm-drawer
  [title]="isEdit() ? 'Edit Tax Exclusion' : 'New Tax Exclusion'"
  [subtitle]="isEdit() ? 'Update the exclusion record.' : 'Exempt an employee fully or partially from tax.'"
  [locked]="saving()"
  (dismiss)="dismiss.emit()"
>
  <form [formGroup]="form" (ngSubmit)="submit()" autocomplete="off">
    <div *ngIf="!isEdit()" class="form-group" style="position: relative;">
      <label class="form-label">Employee <span class="required">*</span></label>
      <input
        type="text"
        class="form-control"
        placeholder="Search employee by name or code…"
        [value]="form.value.employeeLabel || ''"
        (input)="onEmployeeSearch($any($event.target).value)"
      />
      <ul *ngIf="searchResults().length > 0" class="emp-autocomplete">
        <li *ngFor="let emp of searchResults()" (click)="pickEmployee(emp)">
          <strong>{{ emp.fullName }}</strong>
          <span class="text-muted text-xs"> · {{ emp.employeeCode }}</span>
        </li>
      </ul>
    </div>
    <div *ngIf="isEdit()" class="form-group">
      <label class="form-label">Employee</label>
      <input type="text" class="form-control" [value]="form.value.employeeLabel || ''" disabled />
    </div>

    <div class="form-group">
      <label class="form-label">Reason <span class="required">*</span></label>
      <textarea class="form-control" rows="2" formControlName="reason" placeholder="Why is this employee excluded?"></textarea>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
      <div class="form-group">
        <label class="form-label">Exclusion Type <span class="required">*</span></label>
        <select class="form-control" formControlName="exclusionType">
          <option value="Full">Full</option>
          <option value="Partial">Partial</option>
        </select>
      </div>
      <div *ngIf="isPartial()" class="form-group">
        <label class="form-label">Partial Amount <span class="required">*</span></label>
        <input type="number" class="form-control" min="0.01" step="0.01" formControlName="partialExclusionAmount" />
      </div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
      <div class="form-group">
        <label class="form-label">Effective From <span class="required">*</span></label>
        <input type="date" class="form-control" formControlName="effectiveFrom" />
      </div>
      <div class="form-group">
        <label class="form-label">Effective To</label>
        <input type="date" class="form-control" formControlName="effectiveTo" />
        <span class="form-hint">Leave blank for indefinite exclusion.</span>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Certificate No.</label>
      <input type="text" class="form-control" maxlength="100" formControlName="certificateNo" />
    </div>

    <div *ngIf="isEdit()" class="form-group">
      <label class="form-check">
        <input type="checkbox" formControlName="isActive" />
        <span>Active</span>
      </label>
    </div>
  </form>

  <ng-container drawer-footer>
    <button type="button" class="btn btn--secondary" [disabled]="saving()" (click)="dismiss.emit()">Cancel</button>
    <button type="button" class="btn btn--primary" [disabled]="saving()" (click)="submit()">
      {{ saving() ? 'Saving…' : (isEdit() ? 'Save Changes' : 'Add Exclusion') }}
    </button>
  </ng-container>
</hrm-drawer>
