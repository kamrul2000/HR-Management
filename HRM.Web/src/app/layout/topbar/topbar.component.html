<header class="topbar">
  <button
    type="button"
    class="topbar__menu-btn"
    (click)="menuToggle.emit()"
    aria-label="Toggle menu"
  >
    <ng-icon name="heroBars3" size="22" />
  </button>

  <div class="topbar__breadcrumb">
    <hrm-breadcrumb></hrm-breadcrumb>
  </div>

  <div class="topbar__greeting" *ngIf="user()">
    {{ greeting() }}, <strong>{{ user()!.name }}</strong>
  </div>

  <button type="button" class="topbar__icon-btn" aria-label="Notifications">
    <ng-icon name="heroBell" size="18" />
  </button>

  <div class="topbar__user" (hrmClickOutside)="closeMenu()">
    <button
      type="button"
      class="topbar__user-btn"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen()"
    >
      <span class="topbar__avatar">{{ initials() }}</span>
      <span class="topbar__user-name">{{ user()?.name || 'User' }}</span>
      <ng-icon name="heroChevronDown" size="14" />
    </button>

    <div *ngIf="menuOpen()" class="topbar__menu" role="menu">
      <div class="topbar__menu-header">
        <div class="topbar__user-name">{{ user()?.name }}</div>
        <div class="topbar__user-email text-muted">{{ user()?.email }}</div>
      </div>
      <button type="button" class="topbar__menu-item" (click)="closeMenu()">
        <ng-icon name="heroUser" size="16" />
        Profile
      </button>
      <button type="button" class="topbar__menu-item topbar__menu-item--danger" (click)="logout()">
        <ng-icon name="heroArrowRightOnRectangle" size="16" />
        Sign out
      </button>
    </div>
  </div>
</header>
